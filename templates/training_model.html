<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Leaf Diseases</title>

    <!-- bootstrap 5 link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap');

        :root {
            --white: #ffffff;
            --black: #1a1a1a;
            
            --border: 1px solid black;
            /* --border: none; */
        }
        
        * {
            font-family: "Comfortaa", sans-serif;
        }
        
        *::-webkit-scrollbar {
            display: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container-fluid {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100vw;
            height: 100vh;
            padding: 0;
        }

        .container-progress {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 39rem;
            height: 100%;
            padding: 2rem;
        }
        
        .progress-training {
            max-width: 40rem;
            width: 100%;
            padding: 6px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .2);
        }

        .progress-training .progress-bar {
            width: 100%;
            height: 1.5rem;
            background: #0f0;
            border-radius: 5px;
            transition: .8s ease;
        }

        .step-process.text-secondary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }



        .skeleton {
            position: relative;
            overflow: hidden; 
        }
        
        .skeleton::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0f0, #0b0, #0f0);
            background-size: 200% 100%; 
            animation: skeleton 1s reverse infinite;
        } 
        
        @keyframes skeleton {
            0% {
                background-position: -100% 0;
            }
            100% {
                background-position: 100% 0;
            }
        }
        

        .hide {
            display: none;
        }


    </style>

</head>
<body>
    <div class="container-fluid">
        <div class="container-progress">
            <div class="progress-training">
                <div class="progress-bar skeleton"></div>
            </div>
            <h4 class="step-process text-secondary mt-4">Membuat Model Klasifikasi <span>100%</span></h4>
        </div>
    </div>

    <script>
        // Update progress bar
        function updateProgress() {
            fetch('/progress')
                .then(response => response.json())
                .then(data => {
                    if (data.progress < 101) {
                        document.querySelector('.step-process.text-secondary span').innerText = `${data.progress}%`;
                        document.querySelector('.progress-training .progress-bar').style.width = `${data.progress}%`;
                        setTimeout(updateProgress, 500);
                    } 
                });
        } 

        async function trainModelClassification() {
            const response = await fetch('/latih_model_klasifikasi', {
                method: 'GET'
            });
            const data = await response.json();

            if (data.status_model) {
                window.location.href = "{{ url_for('classification') }}";
            }
        }

        // Membuat model klasifikasi sebelum halaman ditampilkan
        document.addEventListener('DOMContentLoaded', function() {
            {% if not status_model %}
                updateProgress();
            {% endif %}
            trainModelClassification();
        });



    </script>
</body>
</html>
