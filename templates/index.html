<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Leaf Diseases</title>

    <!-- bootstrap 5 link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap');

        :root {
            --white: #ffffff;
            --black: #1a1a1a;
            
            --border: 1px solid black;
            /* --border: none; */
        }
        
        * {
            font-family: "Comfortaa", sans-serif;
        }
        
        *::-webkit-scrollbar {
            display: none;
        }
        
        body {
            color: var(--white);
            background-image: url("{{ url_for('static', filename='assets/bg.png') }}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        
            /* border: var(--border); */
        }
        
        .container-fluid {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        
            /* border: var(--border); */
        }
        
        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex; 
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            text-align: left;
            transition: all 0.8s ease; 
        }

        .container .box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            max-width: 30rem;
        }

        p.teks {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
        }



        .hide {
            display: none;
        }
        
        


        @media (max-width:768px) {

            body {
                background-position: center right;
            }

        } 


    </style>

</head>
<body>
    <div class="container-fluid">
        <div class="container">
            <div class="box">
                <h1>Rice Leaf Diseases</h1>
                <p class="teks">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quisquam possimus nam reprehenderit omnis, dolorem est doloremque quas ducimus ex fuga?</p>
                <h4 class="mb-3 {% if not username %}hide{% endif %}">Selamat datang, {{ username }}</h4>
                <div class="options">
                    <a href="{{ url_for('training_model') }}" {% if not username %}onclick="alertLogin(event)"{% endif %} class="btn btn-outline-light">Start Now</a>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-light {% if username %}hide{% endif %}">Login</a>
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-light {% if not username %}hide{% endif %}">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script>

        // Fungsi alert jika pengguna belum login 
        function alertLogin(event) {
            event.preventDefault();
            alert('Anda harus login terlebih dahulu!');
        }


        // Aksi setelah halaman dimuat 
        document.addEventListener('DOMContentLoaded', function() {
            {% if not connection %} 
                window.location.href = "{{ url_for('server_error') }}";
            {% endif %}
        }); 



        
    </script>
</body>
</html>
