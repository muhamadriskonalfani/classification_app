<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rice Leaf Diseases</title>

    <!-- bootstrap 5 link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap');

        :root {
            --white: #ffffff;
            --black: #1a1a1a;
            
            --border: 1px solid black;
            /* --border: none; */
        }
        
        * {
            font-family: "Comfortaa", sans-serif;
        }
        
        *::-webkit-scrollbar {
            display: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--white);
        }
        
        .container-fluid {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex; 
            justify-content: center;
            align-items: center; 
        }

        .container .box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 40rem;
            width: 100%;
            gap: 1rem;
            text-align: center;
        }

        .container .box img {
            width: 100%; 
        }

        .container .box a {
            padding: .2rem 1rem;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .2);
        }


        
        .hide {
            display: none;
        }
        



    </style>

</head>
<body>
    <div class="container-fluid">
        <div class="container">
            <div class="box">
                <img src="{{ url_for('static', filename='assets/server-error.jpeg') }}" alt="">
                <h2>Sorry, unexpected error!</h2>
                <a href="{{ url_for('server_error') }}" class="btn btn-light"><i class="fas fa-redo"></i></a>
            </div>
        </div>
    </div>

    <script>

        // Aksi setelah halaman dimuat 
        document.addEventListener('DOMContentLoaded', function() {
            {% if connection %} 
                window.location.href = "{{ url_for('index') }}";
            {% endif %}
        }); 


        
        
    </script>
</body>
</html>
